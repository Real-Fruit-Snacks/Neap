name: Bug Report
description: Report a bug in Neap
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
  - type: input
    id: version
    attributes:
      label: Version
      description: Neap version or commit hash
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x64
        - Linux x86
        - Windows x64
        - Windows x86
        - Other
